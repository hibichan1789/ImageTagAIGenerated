<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>タグ自動生成アプリ</title>
    <link rel="stylesheet" href="../../style.css">
    <script type="module" src="/src/pages/home/main.ts" defer></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">
    <div class="flex justify-end mb-4">
        <button id="logoutBtn" class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-800 transition hover:cursor-pointer">
            ログアウト
        </button>
    </div>
    <div class="bg-white p-4 rounded-lg shadow mb-6">
        <h3 class="text-lg font-semibold mb-3">
            ファイルアップロード
        </h3>
        <form id="uploadForm" class="flex items-center gap-3">
            <input type="file" accept="image/*" id="fileInput" class="border p-2 rounded w-full hover:cursor-pointer">
            <button type="submit"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition shrink-0 hover:cursor-pointer">
                アップロード
            </button>
        </form>

        <p id="uploadMessage" class="text-sm mt-2 text-gray-600"></p>
    </div>
    <div id="tagFilter" class="flex flex-wrap gap-2 mb-4"></div>
    <div class="max-w-5xl mx-auto">
        <h2 class="text-2xl font-bold mb-6">アップロードしたファイル一覧</h2>

        <div id="fileList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        </div>
    </div>
</body>

</html>
