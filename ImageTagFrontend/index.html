<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="./src/style.css">
    <script type="module" src="main.ts" defer></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow max-w-sm w-full">
        <h1 class="text-2xl font-bold mb-6 text-center">ログイン</h1>

        <form id="loginForm" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label for="email" class="text-sm font-medium">メールアドレス</label>
                <input type="email" id="email" placeholder="メールアドレス" required
                    class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex flex-col gap-1">
                <label for="password" class="text-sm font-medium">パスワード</label>
                <input type="password" id="password" placeholder="パスワード" required
                    class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="submit"
                class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 hover:cursor-pointer transition">ログイン</button>
        </form>

        <p class="text-center mt-4 text-sm">
            アカウントをお持ちでない方は
            <a href="/src/pages/register/register.html" class="text-blue-600 underline">こちら</a>
        </p>
    </div>
</body>

</html>
